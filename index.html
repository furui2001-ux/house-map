<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フロアマップ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    button {
      border: 1px solid #ccc;
      background: white;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.active-floor {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }

    button.mode-on {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }

    button.manual-on {
      background: #d32f2f;
      color: white;
      border-color: #d32f2f;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.7;
    }

    #settingsWrap {
      max-width: 900px;
      margin: 12px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      display: none;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 120px 1fr 1fr;
      gap: 8px;
      align-items: center;
    }

    .settings-grid input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    #mapWrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 16px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      touch-action: manipulation;
    }

    #mapImage {
      width: 100%;
      height: auto;
      display: block;
    }

    #accuracyCircle {
      position: absolute;
      border-radius: 50%;
      background: rgba(25, 118, 210, 0.15);
      border: 2px solid rgba(25, 118, 210, 0.35);
      transform: translate(-50%, -50%);
      left: 50px;
      top: 50px;
      z-index: 8;
      pointer-events: none;
    }

    #dot {
      position: absolute;
      width: 18px;
      height: 18px;
      background: red;
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(255,0,0,0.2);
      left: 50px;
      top: 50px;
      z-index: 10;
      pointer-events: none;
    }

    #dot.animate {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1); }
      50%  { transform: translate(-50%, -50%) scale(1.18); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    #label {
      position: absolute;
      transform: translate(-50%, calc(-100% - 10px));
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      left: 50px;
      top: 50px;
      z-index: 11;
      pointer-events: none;
    }

    #qrReaderWrap {
      max-width: 900px;
      margin: 12px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      display: none;
    }

    #qr-reader {
      width: 100%;
    }

    .note {
      max-width: 900px;
      margin: 0 auto 20px auto;
      padding: 0 12px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
    }

    code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>フロアマップ</h1>

    <div class="controls">
      <button id="btn1F" onclick="switchFloor('1F')">1F</button>
      <button id="btn2F" onclick="switchFloor('2F')">2F</button>
      <button id="btn3F" onclick="switchFloor('3F')">3F</button>
      <button id="btn4F" onclick="switchFloor('4F')">4F</button>
      <button id="btn5F" onclick="switchFloor('5F')">5F</button>
    </div>

    <div class="controls">
      <button id="gpsBtn" onclick="toggleGPS()">GPS開始</button>
      <button id="qrBtn" onclick="toggleQR()">QR補正</button>
      <button id="manualBtn" onclick="toggleManualMode()">手動補正</button>
      <button id="settingsBtn" onclick="toggleSettings()">GPS設定</button>
      <button onclick="moveToCenter()">中央へ</button>
    </div>

    <div id="status">状態: 初期表示</div>
  </header>

  <div id="settingsWrap">
    <h3 style="margin-top:0;">GPS変換設定</h3>
    <div style="margin-bottom:10px;">現在設定中のフロア: <strong id="settingsFloorLabel">1F</strong></div>

    <div class="settings-grid">
      <div>左上 緯度</div>
      <input id="latMaxInput" type="number" step="0.000001" placeholder="35.123456">
      <button onclick="captureCorner('topLeft')">左上を取得</button>

      <div>左上 経度</div>
      <input id="lonMinInput" type="number" step="0.000001" placeholder="139.123456">
      <div></div>

      <div>右下 緯度</div>
      <input id="latMinInput" type="number" step="0.000001" placeholder="35.123400">
      <button onclick="captureCorner('bottomRight')">右下を取得</button>

      <div>右下 経度</div>
      <input id="lonMaxInput" type="number" step="0.000001" placeholder="139.123520">
      <div></div>
    </div>

    <div class="settings-actions">
      <button onclick="saveCurrentFloorBounds()">このフロアに保存</button>
      <button onclick="loadCurrentFloorBoundsToInputs()">再読込</button>
      <button onclick="resetCurrentFloorBounds()">このフロアを初期値へ戻す</button>
    </div>

    <div style="margin-top:10px;font-size:13px;line-height:1.7;color:#555;">
      左上 = 画像の左上の実座標<br>
      右下 = 画像の右下の実座標<br>
      スマホをその場所に持って行き、「左上を取得」「右下を取得」で入力できます。
    </div>
  </div>

  <div id="qrReaderWrap">
    <div id="qr-reader"></div>
  </div>

  <div id="mapWrap">
    <img id="mapImage" src="1F.jpg" alt="フロアマップ" />
    <div id="accuracyCircle"></div>
    <div id="dot" class="animate"></div>
    <div id="label">現在地</div>
  </div>

  <div class="note">
    QRの例：<br>
    <code>floor=1F&nx=0.82&ny=0.30&label=玄関</code><br>
    <code>mode=stairs-up&nx=0.74&ny=0.52&label=階段上り</code>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const STORAGE_KEY = "floorMapBoundsV1";

    const mapWrap = document.getElementById("mapWrap");
    const mapImage = document.getElementById("mapImage");
    const dot = document.getElementById("dot");
    const label = document.getElementById("label");
    const accuracyCircle = document.getElementById("accuracyCircle");
    const statusEl = document.getElementById("status");
    const qrReaderWrap = document.getElementById("qrReaderWrap");
    const settingsWrap = document.getElementById("settingsWrap");

    const gpsBtn = document.getElementById("gpsBtn");
    const qrBtn = document.getElementById("qrBtn");
    const manualBtn = document.getElementById("manualBtn");
    const settingsBtn = document.getElementById("settingsBtn");

    const settingsFloorLabel = document.getElementById("settingsFloorLabel");
    const latMaxInput = document.getElementById("latMaxInput");
    const latMinInput = document.getElementById("latMinInput");
    const lonMinInput = document.getElementById("lonMinInput");
    const lonMaxInput = document.getElementById("lonMaxInput");

    let currentFloor = "1F";
    let watchId = null;
    let qrScanner = null;

    let gpsEnabled = false;
    let qrEnabled = false;
    let manualMode = false;
    let settingsOpen = false;

    let ignoreGpsUntil = 0;
    let lastAccuracyMeters = 0;

    let currentPosition = {
      floor: "1F",
      nx: 0.5,
      ny: 0.5,
      label: "現在地"
    };

    const floorOrder = ["1F", "2F", "3F", "4F", "5F"];

    const defaultFloorConfig = {
      "1F": { image: "1F.jpg", latMax: 35.9080, latMin: 35.9079, lonMin: 139.4820, lonMax: 139.4821 },
      "2F": { image: "2F.jpg", latMax: 35.9080, latMin: 35.9079, lonMin: 139.4820, lonMax: 139.4821 },
      "3F": { image: "3F.jpg", latMax: 35.9080, latMin: 35.9079, lonMin: 139.4820, lonMax: 139.4821 },
      "4F": { image: "4F.jpg", latMax: 35.9080, latMin: 35.9079, lonMin: 139.4820, lonMax: 139.4821 },
      "5F": { image: "5F.jpg", latMax: 35.9080, latMin: 35.9079, lonMin: 139.4820, lonMax: 139.4821 }
    };

    let floorConfig = JSON.parse(JSON.stringify(defaultFloorConfig));

    function loadBoundsFromStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        for (const floor of floorOrder) {
          if (parsed[floor]) {
            floorConfig[floor] = {
              ...floorConfig[floor],
              ...parsed[floor]
            };
          }
        }
      } catch (e) {}
    }

    function saveBoundsToStorage() {
      const data = {};
      for (const floor of floorOrder) {
        data[floor] = {
          latMax: floorConfig[floor].latMax,
          latMin: floorConfig[floor].latMin,
          lonMin: floorConfig[floor].lonMin,
          lonMax: floorConfig[floor].lonMax
        };
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function updateFloorButtons() {
      floorOrder.forEach(floor => {
        const btn = document.getElementById("btn" + floor);
        if (btn) btn.classList.toggle("active-floor", currentFloor === floor);
      });
    }

    function updateModeButtons() {
      gpsBtn.classList.toggle("mode-on", gpsEnabled);
      qrBtn.classList.toggle("mode-on", qrEnabled);
      manualBtn.classList.toggle("manual-on", manualMode);
      settingsBtn.classList.toggle("mode-on", settingsOpen);

      gpsBtn.textContent = gpsEnabled ? "GPS中" : "GPS開始";
      qrBtn.textContent = qrEnabled ? "QR読取中" : "QR補正";
      manualBtn.textContent = manualMode ? "手動補正中" : "手動補正";
      settingsBtn.textContent = settingsOpen ? "GPS設定中" : "GPS設定";
    }

    function renderPosition() {
      const width = mapImage.clientWidth;
      const height = mapImage.clientHeight;

      const x = currentPosition.nx * width;
      const y = currentPosition.ny * height;

      dot.style.left = x + "px";
      dot.style.top = y + "px";
      label.style.left = x + "px";
      label.style.top = y + "px";
      label.textContent = currentPosition.label || "現在地";

      renderAccuracyCircle();
    }

    function renderAccuracyCircle() {
      const width = mapImage.clientWidth;
      const height = mapImage.clientHeight;
      const x = currentPosition.nx * width;
      const y = currentPosition.ny * height;

      accuracyCircle.style.left = x + "px";
      accuracyCircle.style.top = y + "px";

      const circlePx = Math.max(20, Math.min(180, lastAccuracyMeters * 2));
      accuracyCircle.style.width = circlePx + "px";
      accuracyCircle.style.height = circlePx + "px";
      accuracyCircle.style.display = gpsEnabled ? "block" : "none";
    }

    function setNormalizedPosition(floor, nx, ny, text = "現在地") {
      if (floor && floorConfig[floor]) currentFloor = floor;

      currentPosition = {
        floor: currentFloor,
        nx: Math.max(0, Math.min(1, Number(nx))),
        ny: Math.max(0, Math.min(1, Number(ny))),
        label: text
      };

      if (!mapImage.src.includes(floorConfig[currentFloor].image)) {
        mapImage.src = floorConfig[currentFloor].image;
      }

      updateFloorButtons();
      renderPosition();
    }

    function switchFloor(floor) {
      if (!floorConfig[floor]) return;
      currentFloor = floor;
      currentPosition.floor = floor;
      mapImage.src = floorConfig[floor].image;
      updateFloorButtons();
      updateSettingsPanelFromCurrentFloor();

      mapImage.onload = () => {
        renderPosition();
        updateStatus(`状態: ${floor}を表示中`);
      };
    }

    function moveToCenter() {
      setNormalizedPosition(currentFloor, 0.5, 0.5, "中央");
      updateStatus(
        `状態: 中央へ移動<br>` +
        `階: ${currentFloor}<br>` +
        `nx=0.500, ny=0.500`
      );
    }

    function toggleManualMode() {
      manualMode = !manualMode;
      updateModeButtons();

      if (manualMode) {
        updateStatus(`状態: 手動補正モードON<br>地図をタップすると位置が移動します`);
      } else {
        updateStatus(`状態: 手動補正モードOFF`);
      }
    }

    mapWrap.addEventListener("click", function(event) {
      if (!manualMode) return;

      const rect = mapImage.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const clickY = event.clientY - rect.top;

      const nx = clickX / rect.width;
      const ny = clickY / rect.height;

      setNormalizedPosition(currentFloor, nx, ny, "手動補正位置");
      ignoreGpsUntil = Date.now() + 3000;

      updateStatus(
        `状態: 手動補正完了<br>` +
        `階: ${currentFloor}<br>` +
        `nx=${nx.toFixed(3)}, ny=${ny.toFixed(3)}<br>` +
        `3秒間GPS無視中<br>` +
        `QR用: floor=${currentFloor}&nx=${nx.toFixed(3)}&ny=${ny.toFixed(3)}&label=ここ`
      );
    });

    function gpsToNormalized(lat, lon, floor) {
      const b = floorConfig[floor];

      const nx = (lon - b.lonMin) / (b.lonMax - b.lonMin);
      const ny = (b.latMax - lat) / (b.latMax - b.latMin);

      return {
        nx: Math.max(0, Math.min(1, nx)),
        ny: Math.max(0, Math.min(1, ny))
      };
    }

    function toggleGPS() {
      if (gpsEnabled) {
        stopGPSInternal();
      } else {
        startGPSInternal();
      }
      updateModeButtons();
    }

    function startGPSInternal() {
      if (!navigator.geolocation) {
        updateStatus("状態: この端末では位置情報が使えません");
        return;
      }

      if (watchId !== null) navigator.geolocation.clearWatch(watchId);

      gpsEnabled = true;
      updateModeButtons();
      updateStatus("状態: GPS追跡開始");

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          if (Date.now() < ignoreGpsUntil) {
            const remain = ((ignoreGpsUntil - Date.now()) / 1000).toFixed(1);
            updateStatus(`状態: 手動補正後のためGPS一時停止中<br>残り約${remain}秒`);
            return;
          }

          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const acc = pos.coords.accuracy;
          lastAccuracyMeters = acc || 0;

          const { nx, ny } = gpsToNormalized(lat, lon, currentFloor);

          currentPosition = {
            floor: currentFloor,
            nx,
            ny,
            label: "GPS現在地"
          };

          renderPosition();

          updateStatus(
            `状態: GPS追跡中<br>` +
            `階: ${currentFloor}<br>` +
            `緯度: ${lat.toFixed(6)} / 経度: ${lon.toFixed(6)}<br>` +
            `精度: 約${Math.round(acc)}m<br>` +
            `割合座標: nx=${nx.toFixed(3)}, ny=${ny.toFixed(3)}`
          );
        },
        (err) => {
          let msg = "位置取得失敗";
          if (err.code === 1) msg = "位置情報の許可が拒否されました";
          if (err.code === 2) msg = "位置情報を取得できませんでした";
          if (err.code === 3) msg = "位置取得がタイムアウトしました";
          updateStatus(`状態: ${msg}`);
        },
        {
          enableHighAccuracy: false,
          timeout: 30000,
          maximumAge: 3000
        }
      );
    }

    function stopGPSInternal() {
      gpsEnabled = false;
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      accuracyCircle.style.display = "none";
      updateStatus("状態: GPS停止");
    }

    function getNextFloor(current) {
      const idx = floorOrder.indexOf(current);
      return (idx >= 0 && idx < floorOrder.length - 1) ? floorOrder[idx + 1] : current;
    }

    function getPrevFloor(current) {
      const idx = floorOrder.indexOf(current);
      return (idx > 0) ? floorOrder[idx - 1] : current;
    }

    function applyQrNormalized(floor, nx, ny, text = "QR補正位置") {
      if (floor && floorConfig[floor]) {
        currentFloor = floor;
        mapImage.src = floorConfig[floor].image;
        updateFloorButtons();
        updateSettingsPanelFromCurrentFloor();

        mapImage.onload = () => {
          setNormalizedPosition(currentFloor, nx, ny, text);
          ignoreGpsUntil = Date.now() + 3000;
          updateStatus(
            `状態: QR補正完了<br>` +
            `階: ${currentFloor}<br>` +
            `nx=${Number(nx).toFixed(3)}, ny=${Number(ny).toFixed(3)}<br>` +
            `ラベル: ${text}<br>` +
            `3秒間GPS無視中`
          );
        };
      } else {
        setNormalizedPosition(currentFloor, nx, ny, text);
        ignoreGpsUntil = Date.now() + 3000;
        updateStatus(
          `状態: QR補正完了<br>` +
          `階: ${currentFloor}<br>` +
          `nx=${Number(nx).toFixed(3)}, ny=${Number(ny).toFixed(3)}<br>` +
          `ラベル: ${text}<br>` +
          `3秒間GPS無視中`
        );
      }
    }

    function applyStairsMode(mode, nx, ny, text = "階段") {
      let nextFloor = currentFloor;
      if (mode === "stairs-up") nextFloor = getNextFloor(currentFloor);
      if (mode === "stairs-down") nextFloor = getPrevFloor(currentFloor);

      currentFloor = nextFloor;
      mapImage.src = floorConfig[currentFloor].image;
      updateFloorButtons();
      updateSettingsPanelFromCurrentFloor();

      mapImage.onload = () => {
        setNormalizedPosition(currentFloor, nx, ny, text);
        ignoreGpsUntil = Date.now() + 3000;
        updateStatus(
          `状態: 階段QRで階数切替<br>` +
          `現在階: ${currentFloor}<br>` +
          `nx=${Number(nx).toFixed(3)}, ny=${Number(ny).toFixed(3)}<br>` +
          `ラベル: ${text}<br>` +
          `3秒間GPS無視中`
        );
      };
    }

    function parseQrText(decodedText) {
      try {
        let params;

        if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
          const url = new URL(decodedText);
          params = url.searchParams;
        } else {
          params = new URLSearchParams(decodedText);
        }

        const mode = params.get("mode");
        const floor = params.get("floor");
        const nx = params.get("nx");
        const ny = params.get("ny");
        const text = params.get("label") || "QR補正位置";

        if (nx === null || ny === null) {
          updateStatus("状態: QRの形式が正しくありません");
          return;
        }

        if (mode === "stairs-up" || mode === "stairs-down") {
          applyStairsMode(mode, nx, ny, text);
        } else {
          applyQrNormalized(floor, nx, ny, text);
        }
      } catch (e) {
        updateStatus("状態: QRの解析に失敗しました");
      }
    }

    async function toggleQR() {
      if (qrEnabled) {
        await stopQrScanInternal();
      } else {
        await startQrScanInternal();
      }
      updateModeButtons();
    }

    async function startQrScanInternal() {
      try {
        qrReaderWrap.style.display = "block";

        if (!qrScanner) qrScanner = new Html5Qrcode("qr-reader");

        await qrScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => parseQrText(decodedText),
          () => {}
        );

        qrEnabled = true;
        updateModeButtons();
        updateStatus("状態: QR読み取り中...");
      } catch (e) {
        qrEnabled = false;
        updateModeButtons();
        updateStatus("状態: カメラ起動に失敗しました");
      }
    }

    async function stopQrScanInternal() {
      try {
        if (qrScanner && qrScanner.isScanning) {
          await qrScanner.stop();
          await qrScanner.clear();
          qrScanner = null;
        }
      } catch (e) {}
      qrReaderWrap.style.display = "none";
      qrEnabled = false;
      updateModeButtons();
      updateStatus("状態: QR停止");
    }

    function toggleSettings() {
      settingsOpen = !settingsOpen;
      settingsWrap.style.display = settingsOpen ? "block" : "none";
      updateModeButtons();

      if (settingsOpen) {
        updateSettingsPanelFromCurrentFloor();
        updateStatus(`状態: GPS設定を表示中<br>フロア: ${currentFloor}`);
      } else {
        updateStatus(`状態: GPS設定を閉じました`);
      }
    }

    function updateSettingsPanelFromCurrentFloor() {
      settingsFloorLabel.textContent = currentFloor;

      const b = floorConfig[currentFloor];
      latMaxInput.value = b.latMax ?? "";
      latMinInput.value = b.latMin ?? "";
      lonMinInput.value = b.lonMin ?? "";
      lonMaxInput.value = b.lonMax ?? "";
    }

    function saveCurrentFloorBounds() {
      floorConfig[currentFloor].latMax = Number(latMaxInput.value);
      floorConfig[currentFloor].latMin = Number(latMinInput.value);
      floorConfig[currentFloor].lonMin = Number(lonMinInput.value);
      floorConfig[currentFloor].lonMax = Number(lonMaxInput.value);

      saveBoundsToStorage();

      updateStatus(
        `状態: ${currentFloor} のGPS設定を保存しました<br>` +
        `左上: ${floorConfig[currentFloor].latMax}, ${floorConfig[currentFloor].lonMin}<br>` +
        `右下: ${floorConfig[currentFloor].latMin}, ${floorConfig[currentFloor].lonMax}`
      );
    }

    function loadCurrentFloorBoundsToInputs() {
      updateSettingsPanelFromCurrentFloor();
      updateStatus(`状態: ${currentFloor} の設定を再読込しました`);
    }

    function resetCurrentFloorBounds() {
      floorConfig[currentFloor].latMax = defaultFloorConfig[currentFloor].latMax;
      floorConfig[currentFloor].latMin = defaultFloorConfig[currentFloor].latMin;
      floorConfig[currentFloor].lonMin = defaultFloorConfig[currentFloor].lonMin;
      floorConfig[currentFloor].lonMax = defaultFloorConfig[currentFloor].lonMax;

      saveBoundsToStorage();
      updateSettingsPanelFromCurrentFloor();

      updateStatus(`状態: ${currentFloor} の設定を初期値に戻しました`);
    }

    function captureCorner(which) {
      if (!navigator.geolocation) {
        updateStatus("状態: この端末では位置情報が使えません");
        return;
      }

      updateStatus(`状態: ${which === 'topLeft' ? '左上' : '右下'} の位置取得中...`);

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const acc = pos.coords.accuracy;

          if (which === "topLeft") {
            latMaxInput.value = lat.toFixed(6);
            lonMinInput.value = lon.toFixed(6);
          } else {
            latMinInput.value = lat.toFixed(6);
            lonMaxInput.value = lon.toFixed(6);
          }

          updateStatus(
            `状態: ${which === 'topLeft' ? '左上' : '右下'} を取得しました<br>` +
            `緯度: ${lat.toFixed(6)} / 経度: ${lon.toFixed(6)}<br>` +
            `精度: 約${Math.round(acc)}m`
          );
        },
        (err) => {
          let msg = "位置取得失敗";
          if (err.code === 1) msg = "位置情報の許可が拒否されました";
          if (err.code === 2) msg = "位置情報を取得できませんでした";
          if (err.code === 3) msg = "位置取得がタイムアウトしました";
          updateStatus(`状態: ${msg}`);
        },
        {
          enableHighAccuracy: true,
          timeout: 30000,
          maximumAge: 0
        }
      );
    }

    function updateStatus(html) {
      statusEl.innerHTML = html;
    }

    function applyQuery() {
      const params = new URLSearchParams(window.location.search);
      const floor = params.get("floor");
      const nx = params.get("nx");
      const ny = params.get("ny");
      const text = params.get("label");

      if (floor && floorConfig[floor]) {
        currentFloor = floor;
        mapImage.src = floorConfig[floor].image;
      }

      updateFloorButtons();
      updateModeButtons();
      updateSettingsPanelFromCurrentFloor();

      mapImage.onload = () => {
        if (nx !== null && ny !== null) {
          setNormalizedPosition(currentFloor, nx, ny, text || "URL補正位置");
          updateStatus(
            `状態: URL補正位置を表示中<br>` +
            `階: ${currentFloor}<br>` +
            `nx=${Number(nx).toFixed(3)}, ny=${Number(ny).toFixed(3)}`
          );
        } else {
          renderPosition();
          updateStatus(`状態: ${currentFloor}を表示中`);
        }
      };
    }

    window.addEventListener("resize", () => {
      renderPosition();
    });

    window.addEventListener("load", () => {
      loadBoundsFromStorage();
      applyQuery();
      renderPosition();
      updateFloorButtons();
      updateModeButtons();
      updateSettingsPanelFromCurrentFloor();
    });
  </script>
</body>
</html>
