<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フロアマップ</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

header{
background:white;
padding:10px;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
z-index:10;
}

button{
padding:8px 12px;
border-radius:8px;
border:1px solid #ccc;
background:white;
margin:3px;
}

button.active{
background:#1976d2;
color:white;
}

#mapWrap{
position:relative;
max-width:900px;
margin:auto;
background:white;
}

#mapImage{
width:100%;
}

#dot{
position:absolute;
width:16px;
height:16px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 0 6px rgba(255,0,0,0.2);
}

#heading{
position:absolute;
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:40px solid rgba(30,144,255,0.35);
transform-origin:50% 80%;
}

.point{
position:absolute;
transform:translate(-50%,-50%);
background:white;
border:1px solid #555;
padding:2px 6px;
border-radius:12px;
font-size:11px;
}
</style>
</head>

<body>

<header>

<div id="floorButtons"></div>

<div>
<button id="gpsBtn">GPS追従</button>
<button id="qrBtn">QR補正</button>
<button id="manualBtn">手動補正</button>
<button id="adminBtn" style="display:none">管理者</button>
</div>

<div id="status"></div>

</header>

<div id="mapWrap">

<img id="mapImage">

<div id="heading"></div>
<div id="dot"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let config
let currentFloor
let gpsOn=false
let watchId=null
let heading=0
let isAdmin=false

let pos={
nx:0.5,
ny:0.5
}

let anchor=null

const mapImage=document.getElementById("mapImage")
const dot=document.getElementById("dot")
const headingCone=document.getElementById("heading")
const status=document.getElementById("status")
const mapWrap=document.getElementById("mapWrap")

function render(){

let x=pos.nx*mapImage.clientWidth
let y=pos.ny*mapImage.clientHeight

dot.style.left=x+"px"
dot.style.top=y+"px"

headingCone.style.left=x+"px"
headingCone.style.top=y+"px"
headingCone.style.transform="rotate("+heading+"deg)"

}

function loadConfig(){

fetch("config.json")
.then(r=>r.json())
.then(j=>{

config=j

let floors=Object.keys(config.floors)

let html=""

floors.forEach(f=>{

html+=`<button onclick="switchFloor('${f}')" id="btn${f}">${f}</button>`

})

document.getElementById("floorButtons").innerHTML=html

switchFloor(floors[0])

})

}

function switchFloor(f){

currentFloor=f

mapImage.src=config.floors[f].image

document.querySelectorAll("#floorButtons button").forEach(b=>b.classList.remove("active"))

document.getElementById("btn"+f).classList.add("active")

}

function startGPS(){

if(!navigator.geolocation)return

gpsOn=true

watchId=navigator.geolocation.watchPosition(p=>{

if(!anchor)return

let lat=p.coords.latitude
let lon=p.coords.longitude

let dx=(lon-anchor.lon)*90000
let dy=(lat-anchor.lat)*110000

let nx=anchor.nx+dx/config.floors[currentFloor].widthMeters
let ny=anchor.ny-dy/config.floors[currentFloor].heightMeters

let alpha=0.25

pos.nx=pos.nx+(nx-pos.nx)*alpha
pos.ny=pos.ny+(ny-pos.ny)*alpha

render()

status.innerHTML="GPS追従中"

})

}

function stopGPS(){

gpsOn=false

if(watchId)navigator.geolocation.clearWatch(watchId)

status.innerHTML="GPS停止"

}

document.getElementById("gpsBtn").onclick=()=>{

if(gpsOn){

stopGPS()

}else{

startGPS()

}

}

mapWrap.onclick=async e=>{

let rect=mapImage.getBoundingClientRect()

let nx=(e.clientX-rect.left)/rect.width
let ny=(e.clientY-rect.top)/rect.height

let p=await new Promise(res=>navigator.geolocation.getCurrentPosition(res))

anchor={
nx:nx,
ny:ny,
lat:p.coords.latitude,
lon:p.coords.longitude
}

pos.nx=nx
pos.ny=ny

render()

status.innerHTML="補正完了"

}

window.addEventListener("deviceorientation",e=>{

heading=360-e.alpha

render()

})

mapImage.onload=render

loadConfig()

</script>

</body>
</html>
