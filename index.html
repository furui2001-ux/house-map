<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フロアマップ</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f2f2f2;
}

header{
padding:10px;
background:white;
border-bottom:1px solid #ccc;
}

#mapWrap{
position:relative;
max-width:900px;
margin:auto;
background:white;
}

#mapImage{
width:100%;
display:block;
}

#dot{
position:absolute;
width:18px;
height:18px;
background:red;
border-radius:50%;
border:2px solid white;
transform:translate(-50%,-50%);
}

button{
padding:6px 10px;
margin:3px;
border-radius:6px;
border:1px solid #ccc;
background:white;
}

</style>
</head>

<body>

<header>

<button onclick="setFloor('1F')">1F</button>
<button onclick="setFloor('2F')">2F</button>
<button onclick="setFloor('3F')">3F</button>
<button onclick="setFloor('4F')">4F</button>
<button onclick="setFloor('5F')">5F</button>

<button onclick="toggleGPS()">GPS追従</button>

</header>

<div id="mapWrap">

<img id="mapImage">

<div id="dot"></div>

</div>

<script>

let config
let currentFloor="1F"

let dot=document.getElementById("dot")
let mapImage=document.getElementById("mapImage")

let watchId=null

async function loadConfig(){

let res=await fetch("./config.json")

config=await res.json()

setFloor("1F")

}

function setFloor(f){

currentFloor=f

mapImage.src=config.floors[f].image

}

function setDot(nx,ny){

let w=mapImage.clientWidth
let h=mapImage.clientHeight

dot.style.left=(nx*w)+"px"
dot.style.top=(ny*h)+"px"

}

function toggleGPS(){

if(watchId){

navigator.geolocation.clearWatch(watchId)

watchId=null

return

}

watchId=navigator.geolocation.watchPosition(updateGPS,{
enableHighAccuracy:true
})

}

let baseLat=null
let baseLon=null
let baseNx=0.5
let baseNy=0.5

function updateGPS(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude

if(baseLat==null){

baseLat=lat
baseLon=lon

setDot(baseNx,baseNy)

return

}

let metersPerDegLat=111320

let metersPerDegLon=111320*Math.cos(lat*Math.PI/180)

let east=(lon-baseLon)*metersPerDegLon

let north=(lat-baseLat)*metersPerDegLat

let floor=config.floors[currentFloor]

let nx=baseNx+(east/floor.widthMeters)

let ny=baseNy-(north/floor.heightMeters)

setDot(nx,ny)

}

loadConfig()

</script>

</body>
</html>
